<!DOCTYPE html>
<html lang="zh-Hant">
<head>

</head>

<script>
// Fallback if server.url doesn't redirect — manually navigate
setTimeout(() => {
  if (window.location.href.includes("file://") || window.location.href.includes("localhost")) {
    window.location.replace("https://leek-check.streamlit.app");
  }
}, 1000);
</script>
</body>
</html>
