<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>韭菜健檢 — 登入中</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #0f766e 0%, #0a1a1f 35%, #16181d 100%);
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .ring {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(94, 234, 212, 0.2);
    border-top-color: #5eead4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 1.4rem; font-weight: 700; }
  .hint { color: #94a3b8; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="title">🩺 登入中…</div>
  <div class="hint">正在把你帶回韭菜健檢</div>
<script src="oauth_callback.js"></script>
<noscript>
  <p style="color:#fff; margin-top:20px;">瀏覽器停用了 JavaScript,無法完成登入。</p>
</noscript>
</body>
</html>
