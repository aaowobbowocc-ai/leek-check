<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<title>韭菜健檢 — 登入中</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
    background: linear-gradient(135deg, #0f766e 0%, #0a1a1f 35%, #16181d 100%);
    color: #fff;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  .ring {
    width: 40px;
    height: 40px;
    border: 3px solid rgba(94, 234, 212, 0.2);
    border-top-color: #5eead4;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title { font-size: 1.4rem; font-weight: 700; }
  .hint { color: #94a3b8; font-size: 0.85rem; }
</style>
</head>
<body>
  <div class="ring"></div>
  <div class="title">🩺 登入中…</div>
  <div class="hint">正在把你帶回韭菜健檢</div>
<script>
(function() {
  try {
    var hash = window.location.hash || '';
    if (hash.charAt(0) === '#') hash = hash.substring(1);
    var params = new URLSearchParams(hash);
    var at = params.get('access_token');
    var rt = params.get('refresh_token');
    if (at && rt) {
      // 寫 cookie(2 分鐘有效,夠 Streamlit 讀一次後清掉)
      var expires = new Date(Date.now() + 120 * 1000).toUTCString();
      document.cookie = 'leek_oauth_at=' + encodeURIComponent(at) +
                        '; path=/; expires=' + expires + '; SameSite=Lax';
      document.cookie = 'leek_oauth_rt=' + encodeURIComponent(rt) +
                        '; path=/; expires=' + expires + '; SameSite=Lax';
    }
  } catch (e) {
    console.error('OAuth callback parse failed', e);
  }
  // 不論成功 / 失敗都回主畫面
  setTimeout(function() {
    window.location.replace('/');
  }, 200);
})();
</script>
</body>
</html>
