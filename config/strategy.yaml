# 策略參數 — walk_forward 每月會滾動優化並覆寫此檔的「下一期」版本

# ─────────────────────────────────────────
# 因子權重（總和 = 1.00）
# ─────────────────────────────────────────
factor_weights:
  chip_concentration: 0.45    # 籌碼集中度（台股短線最強先行指標）
  sector_momentum:    0.15    # 族群動能
  supply_chain:       0.15    # 供應鏈傳導
  news_sentiment:     0.10    # LLM 新聞情緒
  technical:          0.15    # 技術面
  market_regime:      0.00    # 大盤背景（已由 black_swan + regime 外部處理，權重內歸零）

# ─────────────────────────────────────────
# 推薦門檻
# ─────────────────────────────────────────
recommendation:
  min_score: 62               # 綜合分 ≥ 62 才進晨報（精兵政策）
  max_picks: 3                # 每日最多推薦 3 檔

# ─────────────────────────────────────────
# 風控參數
# ─────────────────────────────────────────
risk:
  max_per_trade_pct: 2.0      # 單筆最大風險 = 總資金 2%
  max_single_position_pct: 20.0
  max_concurrent_positions: 3
  kelly_fraction: 0.5         # Half-Kelly
  atr_stop_multiplier: 1.5    # 止損 = 進場 − 1.5×ATR（縮緊保本金）
  atr_target_multiplier: 4.0  # 目標 = 進場 + 4.0×ATR（追求爆發力，理論 P/L = 2.67）
  chandelier_k: 2.0            # 吊燈止損：+2 ATR 後 stop = 最高 − 2×ATR
  liquidity_volume_pct: 1.0   # 單筆 ≤ 前日成交量 1%
# Phase 13 全數撤銷（2026-04-24）：structural_stop / bollinger_exit / macd_divergence
# 均在 16 檔半導體設備 watchlist 實測無效或有害，詳見 atr_stops.py 檔頭註解。

# ─────────────────────────────────────────
# 交易成本（台股）
# ─────────────────────────────────────────
costs:
  buy_fee_rate: 0.001425      # 買進手續費
  sell_fee_rate: 0.001425     # 賣出手續費
  tax_rate: 0.003             # 賣出證交稅
  slippage_rate: 0.001        # 滑價
  tax_rate_discount: 1.0      # 當沖降稅 / 券商手續費折扣倍率（1.0 = 無折扣）

# ─────────────────────────────────────────
# 黑天鵝過濾（任一觸發 → 防守模式）
# ─────────────────────────────────────────
black_swan:
  adr_drop_pct: -3.0          # TSMC ADR 昨夜跌幅
  vix_threshold: 25.0
  taiex_below_monthly_ma: true

# ─────────────────────────────────────────
# Regime Detector（波動機制）
# ─────────────────────────────────────────
regime:
  lookback_days: 20
  reference_years: 5
  thresholds:
    low: 0.8
    normal_high: 1.3
    high_crazy: 2.0
  crazy_force_cash: true      # vol_ratio > 2.0 強制空手

# ─────────────────────────────────────────
# Sector RS（Phase 11 定盤 — D-only）
# ─────────────────────────────────────────
# 設計原則：SectorFactor 仍計算族群相對強弱並輸出 sector_leading / sector_lagging flags
# 供晨報顯示族群資訊，但 composite 層不再據此調分（已移除 laggard_penalty）。
# 驗證結果：rollback vs D-only 在 2024/2025 Sharpe 完全相同（penalty 被 breadth 防線幾乎總是 gate 掉），
# 2023 D-only 實測 +0.08 Sharpe 優於保留 penalty → 移除更簡潔且無退化風險。

# ─────────────────────────────────────────
# Valuation Guard（Phase 12 — 已結案關閉）
# ─────────────────────────────────────────
# Phase 12 目標：用 PBR 5 年百分位治 2023 Sharpe 0.67 弱點。
# 驗收結果：
#   - 12A（無 gate）：2023 Sharpe 0.67 → 0.11（−0.56 嚴重退化，AI 啟動年誤殺贏家）
#   - 12B（regime-aware，bull 不扣分）：2023 仍 −0.10；2025 原本 +0.29 好處被 gate 關掉 → no-op
#   - 根因：16 檔 AI / 半導體設備高度同向，PBR 百分位無差異化訊號（反映市場氣氛、非相對估值）
# 決策：關閉 penalty，保留資料流水線（get_per_pbr / valuation_guard.py / TickerInputs.pbr
#       / DailySnapshot.pbr / FactorBundle.pbr_overvalued）供 Phase 13 重用候選：
#         - PBR velocity（短期擴張速度，非絕對百分位）
#         - Volatility regime per-ticker
#         - Chip decay（投信連買天數縮短預警）
# penalty_points: 0 → 即使 FactorBundle.pbr_overvalued=True composite 也不扣分
valuation:
  threshold_percentile: 0.90
  penalty_points: 0.0           # Phase 12 結案：penalty 關閉（保留欄位供 Phase 13）
  lookback_years: 5
  min_sample_size: 252

# ─────────────────────────────────────────
# Concept Drift
# ─────────────────────────────────────────
concept_drift:
  window_size: 5              # 滾動 5 筆交易
  alert_threshold: 0.20       # sum|預測−實際| > 20% 觸發
  force_paper_trading_after: 10
