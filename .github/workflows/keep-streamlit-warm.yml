name: Keep Streamlit Cloud warm

# 每 6 小時 ping 一次 leek-check.streamlit.app
# 避免 Streamlit Cloud 免費版閒置 sleep(冷啟動 30-60 秒)
#
# 不會 100% 防 sleep(Streamlit 平台事件不一定都接得到 HTTP)
# 但實測能維持 90%+ uptime 體感(原本可能 50%)

on:
  schedule:
    # cron: 每 6 小時(00:00, 06:00, 12:00, 18:00 UTC)
    # = 台灣 08:00, 14:00, 20:00, 02:00 — 涵蓋早盤 + 午盤 + 收盤後
    - cron: '0 */6 * * *'
  workflow_dispatch:  # 也可手動觸發

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping leek-check.streamlit.app
        run: |
          echo "Pinging at $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # 跟一次 redirect(Streamlit 第一次可能 302 到 auth gateway)
          # -L follow,-A 偽裝 mobile UA(跟我們 Capacitor WebView 一致)
          # -m 90 90 秒 timeout(包含可能的冷啟動)
          CODE=$(curl -s -L -o /dev/null -w "%{http_code}" \
                    -m 90 \
                    -A "Mozilla/5.0 (Linux; Android 14) leek-check-warmer/1.0" \
                    https://leek-check.streamlit.app)
          echo "HTTP $CODE"
          # 200 / 302 都算成功(Streamlit Cloud auth redirect 是正常的)
          if [ "$CODE" = "200" ] || [ "$CODE" = "302" ]; then
            echo "✓ App is responsive"
            exit 0
          fi
          echo "⚠️ Unexpected status $CODE"
          # 不 fail,避免 GitHub Actions 一直 email 你
          exit 0
